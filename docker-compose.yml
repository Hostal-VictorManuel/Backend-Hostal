services:
  postgres:
    image: postgres:16
    container_name: sistemahostal-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sistemahostal-net
    # Sin "ports:" a propósito -- Postgres solo debe ser accesible
    # dentro de la red interna de Docker, nunca expuesto a internet.

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sistemahostal-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      JwtSettings__SecretKey: ${JWT_SECRET_KEY}
      JwtSettings__Issuer: SistemaHostal.API
      JwtSettings__Audience: SistemaHostal.Clients
      JwtSettings__ExpirationMinutes: 60
      ApiKeySettings__Key: ${N8N_API_KEY}
    ports:
      - "127.0.0.1:8080:8080"
      # Solo accesible desde el propio servidor (localhost) -- Nginx
      # es el que expone el puerto 443 hacia internet y hace proxy hacia aquí.
    networks:
      - sistemahostal-net

  n8n:
    image: n8nio/n8n:latest
    container_name: sistemahostal-n8n
    restart: unless-stopped
    mem_limit: 400m
    # Límite duro de memoria -- si n8n tiene un pico raro, no se come
    # el servidor entero ni tumba a la API o Postgres.
    environment:
      N8N_HOST: ${N8N_HOST}
      N8N_PROTOCOL: https
      N8N_PORT: 5678
      WEBHOOK_URL: https://${N8N_HOST}/
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      GENERIC_TIMEZONE: America/Lima
      TZ: America/Lima
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "127.0.0.1:5678:5678"
      # Igual que la API: solo accesible localmente, Nginx expone hacia afuera.
    networks:
      - sistemahostal-net

volumes:
  postgres_data:
  n8n_data:

networks:
  sistemahostal-net:
    driver: bridge